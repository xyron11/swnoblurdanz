    <div class="container" style="margin-top: 20px;">
        <div class="logo">
            <h1>Statistik</h1>

        <div class="upload-box" style="cursor: default; min-height: 200px;">
            <div class="icon">👥</div>
            <h2 id="visitor-count" style="font-size: 48px; font-weight: 800; background: linear-gradient(135deg, #73a5ff, #3d6cff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">...</h2>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        function toggleMenu() {
            document.getElementById("sidebar").classList.toggle("active");
            document.getElementById("overlay").classList.toggle("active");
            document.body.classList.toggle("sidebar-open"); 
        }

        const firebaseConfig = {
            apiKey: "AIzaSyCEj9USiCvQbbwvaZiFDN4lkLitPXWzew4",
            authDomain: "danzzclean.firebaseapp.com",
            databaseURL: "https://danzzclean-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "danzzclean",
            storageBucket: "danzzclean.firebasestorage.app",
            messagingSenderId: "254872462958",
            appId: "1:254872462958:web:a7964353bb5afa6678287f",
            measurementId: "G-HCR72KT3X0"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const visitorRef = database.ref("total_visitors");

        function trackUniqueVisitorWithFirebase() {
            const storageKey = "danzclear_firebase_visited";
            const hasVisited = localStorage.getItem(storageKey);

            if (!hasVisited) {
                visitorRef.transaction((currentValue) => {
                    return (currentValue || 0) + 1;
                }, (error, committed, snapshot) => {
                    if (committed) {
                        localStorage.setItem(storageKey, "true");
                    }
                });
            }

            visitorRef.on("value", (snapshot) => {
                const count = snapshot.val() || 0;
                document.getElementById('visitor-count').innerText = count.toLocaleString('id-ID');
            }, (error) => {
                document.getElementById('visitor-count').innerText = "0";
            });
        }

        window.onload = trackUniqueVisitorWithFirebase;
    </script>

</body>
